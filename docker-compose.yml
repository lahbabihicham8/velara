services:
  postgres:
    image: postgres:16-alpine
    container_name: velarapay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: velarapay
      POSTGRES_PASSWORD: velarapay
      POSTGRES_DB: velarapay
    ports:
      - "5432:5432"
    volumes:
      - velarapay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velarapay -d velarapay"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  velarapay_pgdata:
