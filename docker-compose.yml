services:
  postgres:
    image: postgres:16-alpine
    container_name: nexapay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexapay
      POSTGRES_PASSWORD: nexapay
      POSTGRES_DB: nexapay
    ports:
      - "5432:5432"
    volumes:
      - nexapay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexapay -d nexapay"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexapay_pgdata:
